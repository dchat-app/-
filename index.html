<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>D-CHAT</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00d95a">
<link rel="apple-touch-icon" href="logo.png">  
<script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
<style>
:root { --green: #00d95a; --bg: #000000; --panel: #121212; --text: #ffffff; --red: #ff4444; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100svh; }

header { padding: 15px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; display: flex; align-items: center; background: var(--bg); }
header h2 { margin: 0; color: var(--green); font-size: 22px; font-weight: 900; }

.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

#homeList, #view-settings { flex: 1; overflow-y: auto; padding: 15px; }

#chat-flow { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; }
.bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 15px; word-wrap: break-word; }
.bubble.me { background: var(--green); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
.bubble.friend { background: #fff; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }

.input-group { display: flex; gap: 8px; padding: 10px; background: var(--bg); border-top: 1px solid #1a1a1a; flex-shrink: 0; align-items: center; }
input { height: 50px; background: #1a1a1a; border: 1px solid var(--green); border-radius: 25px; padding: 0 15px; color: white; font-size: 16px; width: 100%; }

.circle-btn { width: 50px; height: 50px; background: var(--green); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
.action-btn { background: var(--green); border: none; height: 50px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: black; margin-top: 5px; }

nav { display: flex; background: #0a0a0a; border-top: 1px solid #1a1a1a; justify-content: space-around; height: 70px; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
.nav-item { color: #444; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-item.active { color: var(--green); }
.nav-item svg { width: 28px; height: 28px; fill: currentColor; }

.tab-switcher { display: flex; background: var(--panel); border-radius: 12px; margin: 10px 0; padding: 4px; flex-shrink: 0; }
.tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #888; border-radius: 8px; font-weight: bold; }
.tab-btn.active { background: var(--green); color: black; }

#authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
.logout-btn { background: var(--red); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; margin-top: 20px; }
</style>
</head>
<body>

<div id="authOverlay" style="display:none">
  <h1 style="color:var(--green); text-align:center; margin-bottom: 40px; font-size: 42px;">D-CHAT</h1>
  <input id="authUser" placeholder="Username" style="margin-bottom:10px">
  <input id="authPass" type="password" placeholder="Password" style="margin-bottom:20px">
  <button onclick="doAuth('/login')" class="action-btn" style="border-radius:30px;">LOG IN</button>
  <button onclick="doAuth('/signup')" style="background:none; color:var(--green); border:none; margin-top:15px; width:100%; font-weight:bold;">Create Account</button>
</div>

<div id="app">
  <header><h2 id="mainTitle">Home</h2></header>
  
  <div id="view-home" class="view active">
    <div style="padding:15px 15px 0 15px">
        <div style="display:flex; gap:8px">
            <input id="addInput" placeholder="User ID or Name" style="border-radius:30px;">
            <button onclick="sendReq()" class="circle-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
        <div class="tab-switcher">
          <button class="tab-btn active" id="btn-friends" onclick="setTab('friends')">Friends</button>
          <button class="tab-btn" id="btn-reqs" onclick="setTab('reqs')">Requests</button>
        </div>
    </div>
    <div id="homeList"></div>
  </div>

  <div id="view-chat" class="view">
    <div id="chat-flow"></div>
    <div class="input-group">
      <input id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMsg()">
      <button class="circle-btn" onclick="sendMsg()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div id="view-settings" class="view">
    <div id="my-name" style="font-size:24px; font-weight:bold; margin-bottom:5px"></div>
    <div id="my-id" style="color:var(--green); margin-bottom:20px; font-family:monospace"></div>
    <button onclick="logout()" class="logout-btn">LOGOUT</button>
  </div>

  <nav>
    <div class="nav-item active" id="nav-home" onclick="showView('home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <div class="nav-item" id="nav-chat" onclick="showView('chat')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
    <div class="nav-item" id="nav-settings" onclick="showView('settings')"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg></div>
  </nav>
</div>

<script>
const API_BASE = "https://d-chat.d-chat2345-0a6.workers.dev";
const P_KEY = "bca8b337b8b15aab83f8";
const P_CLUSTER = "eu";

let userID = localStorage.getItem('dchat_id');
let currentPeer = null, currentPeerName = "", currentSub = null, homeTab = 'friends';
const pusher = new Pusher(P_KEY, { cluster: P_CLUSTER });

if (!userID) document.getElementById('authOverlay').style.display = 'flex';

async function api(path, body = null) {
  const options = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) options.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, options);
  return await r.json();
}

async function doAuth(path) {
  const user = document.getElementById('authUser').value.trim();
  const pass = document.getElementById('authPass').value.trim();
  const res = await api(path, { username: user, password: pass });
  if (res.userID) { localStorage.setItem('dchat_id', res.userID); location.reload(); }
  else alert(res.msg || "Error");
}

function showView(v) {
  document.querySelectorAll('.view, .nav-item').forEach(e => e.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('mainTitle').innerText = v.charAt(0).toUpperCase() + v.slice(1);
  if(v === 'home') loadHome();
  if(v === 'settings') api('/me?userID=' + userID).then(r => { document.getElementById('my-name').innerText = r.name; document.getElementById('my-id').innerText = userID; });
}

function setTab(t) { homeTab = t; loadHome(); document.getElementById('btn-friends').className = 'tab-btn ' + (t==='friends'?'active':''); document.getElementById('btn-reqs').className = 'tab-btn ' + (t==='reqs'?'active':''); }

async function loadHome() {
  const data = await api('/syncHome?userID=' + userID);
  const list = homeTab === 'friends' ? data.friends : data.requests;
  let h = '';
  list.forEach(id => {
    const u = data.users.find(x => x.id === id) || { name: 'User' };
    h += `<div style="background:var(--panel);padding:15px;border-radius:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center" onclick="${homeTab==='friends'?'openChat(\''+id+'\',\''+u.name+'\')':'acceptReq(\''+id+'\')'}"><div><b>${u.name}</b><br><small>${homeTab==='friends'?'Tap to chat':'Wants to add you'}</small></div>${homeTab==='reqs'?'<button>Accept</button>':''}</div>`;
  });
  document.getElementById('homeList').innerHTML = h || '<p style="text-align:center;opacity:0.3">Empty</p>';
}

function openChat(id, name) {
  currentPeer = id; currentPeerName = name; showView('chat');
  const room = [userID, id].sort().join('_');
  if (currentSub) pusher.unsubscribe(currentSub);
  currentSub = room;
  pusher.subscribe(room).bind('msg', d => { if (d.senderID !== userID) renderMsg(d); });
  document.getElementById('chat-flow').innerHTML = '';
  api(`/messages?userID=${userID}&peerID=${id}`).then(m => m.forEach(renderMsg));
}

function renderMsg(m) {
  const d = document.createElement('div');
  d.className = 'bubble ' + (m.senderID === userID ? 'me' : 'friend');
  d.innerText = m.text;
  const f = document.getElementById('chat-flow'); f.appendChild(d); f.scrollTop = f.scrollHeight;
}

async function sendMsg() {
  const i = document.getElementById('msgInput'); const t = i.value.trim();
  if (!t || !currentPeer) return;
  i.value = ''; renderMsg({ senderID: userID, text: t });
  await api('/send', { senderID: userID, receiverID: currentPeer, text: t });
}

async function sendReq() { const v = document.getElementById('addInput').value.trim(); await api('/friendRequest', { userID, targetID: v }); alert('Sent'); }
async function acceptReq(fid) { await api('/acceptRequest', { userID, targetID: fid }); loadHome(); }
function logout() { localStorage.clear(); location.reload(); }
if(userID) loadHome();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
