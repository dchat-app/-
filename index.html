<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Test</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d95a">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #121212; padding: 2rem; border-radius: 20px; border: 2px solid #00d95a; text-align: center; }
        button { background: #00d95a; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PWA Working?</h1>
        <p id="status">Checking Service Worker...</p>
        <button onclick="location.reload()">Refresh Page</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => { document.getElementById('status').innerText = "Service Worker: Active ✅"; })
                .catch(err => { document.getElementById('status').innerText = "Service Worker: Failed ❌"; });
        } else {
            document.getElementById('status').innerText = "PWA not supported in this browser.";
        }
    </script>
</body>
</html>
